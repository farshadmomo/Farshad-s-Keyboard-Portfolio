<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Navy keycap body, matching the 3D keyboard case (#3a4250 / #2c3340) -->
    <linearGradient id="case" x1="32" y1="10" x2="32" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3a4250"/>
      <stop offset="1" stop-color="#262c38"/>
    </linearGradient>
    <!-- Orange top face, matching the signature esc-key accent (#ff5b1f) -->
    <linearGradient id="esc" x1="32" y1="10" x2="32" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff7a45"/>
      <stop offset="0.55" stop-color="#ff5b1f"/>
      <stop offset="1" stop-color="#e8470f"/>
    </linearGradient>
  </defs>

  <!-- Keycap body + front bevel -->
  <rect x="9" y="10" width="46" height="46" rx="9" fill="url(#case)"/>
  <!-- Top edge highlight on the case -->
  <rect x="9" y="10" width="46" height="46" rx="9" fill="none" stroke="#4a5260" stroke-width="1" opacity="0.6"/>

  <!-- Orange top face (the pressable surface) -->
  <rect x="12" y="10" width="40" height="36" rx="7" fill="url(#esc)"/>
  <!-- Sheen across the top of the face -->
  <rect x="14" y="12" width="36" height="9" rx="4.5" fill="#ffffff" opacity="0.18"/>

  <!-- "F" monogram in keycap cream (#ece6d5) -->
  <g fill="#f3eede">
    <rect x="24" y="17" width="6.5" height="22" rx="1.5"/>
    <rect x="24" y="17" width="16" height="6.5" rx="1.5"/>
    <rect x="24" y="25.5" width="12" height="6" rx="1.5"/>
  </g>
</svg>
